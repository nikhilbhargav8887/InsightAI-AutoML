version: "3.9"

services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend

    container_name: insight-backend

    ports:
      - "8000:8000"

    restart: always

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend

    container_name: insight-frontend

    ports:
      - "8501:8501"

    depends_on:
        - backend

    restart: always